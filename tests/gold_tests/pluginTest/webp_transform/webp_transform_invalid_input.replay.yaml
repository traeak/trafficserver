meta:
  version: "1.0"

autest:
  description: 'Verify webp_transform safely passes through invalid image bodies'

  server:
    name: 'webp-transform-server'

  client:
    name: 'webp-transform-client'

  ats:
    name: 'webp-transform-ts'
    process_config:
      enable_cache: false
      disable_log_checks: true

    plugin_config:
      - 'webp_transform.so convert_to_jpeg,convert_to_webp'

    records_config:
      proxy.config.diags.debug.enabled: 1
      proxy.config.diags.debug.tags: 'webp_transform'

    remap_config:
      - from: 'http://www.example.com/'
        to: 'http://127.0.0.1:{SERVER_HTTP_PORT}/'

    log_validation:
      diags_log:
        contains:
          - expression: 'input body does not match its declared image encoding'
            description: 'Verify invalid input is rejected before conversion'
        excludes:
          - expression: 'zero-length blob not permitted|no decode delegate for this image format'
            description: 'Verify ImageMagick never receives the invalid input'

sessions:
  - transactions:
      - client-request:
          method: GET
          version: '1.1'
          url: /empty.webp
          headers:
            fields:
              - [Host, www.example.com]
              - [Accept, 'image/jpeg']
              - [uuid, empty-webp]

        server-response:
          status: 200
          reason: OK
          headers:
            fields:
              - [Content-Type, image/webp]
              - [Content-Length, 0]
          content:
            size: 0

        proxy-response:
          status: 200
          headers:
            fields:
              - [Content-Type, {value: image/webp, as: equal}]
          content:
            size: 0

      - client-request:
          method: GET
          version: '1.1'
          url: /invalid.webp
          headers:
            fields:
              - [Host, www.example.com]
              - [Accept, 'image/jpeg']
              - [uuid, invalid-webp]

        server-response:
          status: 200
          reason: OK
          headers:
            fields:
              - [Content-Type, image/webp]
              - [Content-Length, 1]
          content:
            data: x

        proxy-response:
          status: 200
          headers:
            fields:
              - [Content-Type, {value: image/webp, as: equal}]
          content:
            verify: {value: x, as: equal}

      - client-request:
          method: GET
          version: '1.1'
          url: /invalid.jpg
          headers:
            fields:
              - [Host, www.example.com]
              - [Accept, 'image/webp']
              - [uuid, invalid-jpeg]

        server-response:
          status: 200
          reason: OK
          headers:
            fields:
              - [Content-Type, image/jpeg]
              - [Content-Length, 8]
          content:
            data: not-jpeg

        proxy-response:
          status: 200
          headers:
            fields:
              - [Content-Type, {value: image/jpeg, as: equal}]
          content:
            verify: {value: not-jpeg, as: equal}

      - client-request:
          method: GET
          version: '1.1'
          url: /valid.webp
          headers:
            fields:
              - [Host, www.example.com]
              - [Accept, 'image/jpeg']
              - [uuid, valid-webp]

        server-response:
          status: 200
          reason: OK
          headers:
            fields:
              - [Content-Type, image/webp]
              - [Content-Length, 68]
          content:
            encoding: uri
            data: "%52%49%46%46%3c%00%00%00%57%45%42%50%56%50%38%20%30%00%00%00%d0%01%00%9d\
              %01%2a%01%00%01%00%02%00%34%25%a0%02%74%ba%01%f8%00%03%b0%00%fe%f0%c4%0b\
              %ff%20%b9%61%75%c8%d7%ff%20%3f%e4%07%fc%80%ff%f8%f2%00%00%00"

        proxy-response:
          status: 200
          headers:
            fields:
              - [Content-Type, {value: image/jpeg, as: equal}]
              - [Vary, {value: Accept, as: equal}]
          content:
            verify: {value: JFIF, as: contains}

      - client-request:
          method: GET
          version: '1.1'
          url: /health
          headers:
            fields:
              - [Host, www.example.com]
              - [uuid, health]

        server-response:
          status: 200
          reason: OK
          headers:
            fields:
              - [Content-Type, text/plain]
              - [Content-Length, 2]
          content:
            data: OK

        proxy-response:
          status: 200
          content:
            verify: {value: OK, as: equal}
