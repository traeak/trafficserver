#
# Origin replay for the global active-streams cap test in advisory mode.
# All four streams reach the origin since the proxy only adjusts the
# advertised SETTINGS_MAX_CONCURRENT_STREAMS rather than refusing
# streams. Responses are delayed so the gauge stays at the cap while
# later HEADERS frames are admitted.

meta:
  version: "1.0"

sessions:
- transactions:
  - client-request:
      headers:
        fields:
        - [ :method, GET ]
        - [ :scheme, https ]
        - [ :authority, www.example.com ]
        - [ :path, /stream/1 ]
        - [ uuid, max-active-streams-1 ]
    server-response:
      delay: 1s
      headers:
        fields:
        - [ :status, 200 ]
        - [ Content-Length, 0 ]

  - client-request:
      headers:
        fields:
        - [ :method, GET ]
        - [ :scheme, https ]
        - [ :authority, www.example.com ]
        - [ :path, /stream/3 ]
        - [ uuid, max-active-streams-3 ]
    server-response:
      delay: 1s
      headers:
        fields:
        - [ :status, 200 ]
        - [ Content-Length, 0 ]

  - client-request:
      headers:
        fields:
        - [ :method, GET ]
        - [ :scheme, https ]
        - [ :authority, www.example.com ]
        - [ :path, /stream/5 ]
        - [ uuid, max-active-streams-5 ]
    server-response:
      delay: 1s
      headers:
        fields:
        - [ :status, 200 ]
        - [ Content-Length, 0 ]

  - client-request:
      headers:
        fields:
        - [ :method, GET ]
        - [ :scheme, https ]
        - [ :authority, www.example.com ]
        - [ :path, /stream/7 ]
        - [ uuid, max-active-streams-7 ]
    server-response:
      delay: 1s
      headers:
        fields:
        - [ :status, 200 ]
        - [ Content-Length, 0 ]
